</style>

<script>
// ---- Tab metadata (static, never changes) ----
var TAB_META = {
  world:    { title: "Top Story of the Day", subtitle: "Today\u2019s top story with a conservative view, Democrat view, and third-party view. Click on summary to link directly to actual X post." },
  business: { title: "Top Business Story of the Day", subtitle: "Markets, money, and what\u2019s moving business today. Click to expand." },
  sports:   { title: "Top Sports Story of the Day", subtitle: "Today\u2019s biggest sports moment. Click to expand." },
  elon:     { title: "Elon\u2019s Latest Bangers", subtitle: "What\u2019s Elon posting? His most interesting themes and posts right now. One per theme." },
  allin:    { title: "$age Insider", subtitle: "Billion-dollar wisdom \u2014 Elon, Thiel, Luckey, a16z, Chamath, Sacks, Friedberg & Jurvetson. Click to expand." },
  top:      { title: "#1 Pop", subtitle: "The single most viral post on X right now." },
  msm:      { title: "Not in MSM", subtitle: "Stories mainstream media is underreporting or ignoring. Click to expand." },
  pg6:      { title: "Pg. 6", subtitle: "The juiciest, most viral entertainment story on X right now. Gossip scored for honesty." },
  recipe:   { title: "Top Recipes", subtitle: "The most viral, loved, and talked-about recipe posts on X right now." },
  local:    { title: "Local News", subtitle: "Trending local stories from citizen journalists on X \u2014 news your local TV station won\u2019t cover. Orange County / SoCal." },
  pods:     { title: "Trending Pods", subtitle: "Top trending podcast clips on X right now \u2014 the moments everyone is talking about." },
  science:  { title: "Science Corner", subtitle: "The most viral science, space, health, and tech discovery posts on X right now." }
};

// ---- Story data (loaded from stories.json) ----
var NEWS_DATA = { lastUpdated: "", _stale: false };

// ---- Load stories.json ----
function loadStories() {
  fetch("stories.json?t=" + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      NEWS_DATA = data;
      renderNav();
      renderContent();
      checkMidnightRotation();
    })
    .catch(function(err) {
      console.error("Failed to load stories.json:", err);
      document.getElementById("content").innerHTML = '<div class="loading">Could not load stories. Refresh to try again.</div>';
    });
}

// ---- Tab definitions ----
function myfeedTabLabel(slot) {
  try {
    var interests = localStorage.getItem("myfeed_interests_" + slot);
    if (interests) {
      var word = interests.split(/[&]/)[0].trim();
      if (word.length > 12) word = word.substring(0, 10) + "..";
      return word;
    }
  } catch(e) {}
  return "My Feed " + slot;
}
var TABS = [
  { id: "world", label: "World" },
  { id: "business", label: "Business" },
  { id: "local", label: "Local" },
  { id: "sports", label: "Sports" },
  { id: "top", label: "Trending" },
  { id: "msm", label: "<s>MSM</s>" },
  { id: "elon", label: "Elon" },
  { id: "allin", label: "$age" },
  { id: "pods", label: "Pods" },
  { id: "recipe", label: "Recipe" },
  { id: "pg6", label: "Pg. 6" },
  { id: "science", label: "Science" },
  { id: "earlier", label: "Earlier" },
  { id: "myfeed1", label: myfeedTabLabel("1") },
  { id: "myfeed2", label: myfeedTabLabel("2") },
  { id: "submit", label: "Post/Replace" }
];
var activeTab = "world";

function formatDate() { var d = new Date(), days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"], months = ["January","February","March","April","May","June","July","August","September","October","November","December"]; return days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear(); }
function todayLabel() { var d = new Date(), months = ["January","February","March","April","May","June","July","August","September","October","November","December"]; return months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear(); }

function renderNav() {
  var nav = document.getElementById("nav");
  TABS.forEach(function(t) {
    if (t.id === "myfeed1") t.label = myfeedTabLabel("1");
    if (t.id === "myfeed2") t.label = myfeedTabLabel("2");
  });
  nav.innerHTML = TABS.map(function(t) { return '<a data-tab="' + t.id + '" class="' + (t.id === activeTab ? 'active' : '') + '">' + t.label + '</a>'; }).join("");
  nav.querySelectorAll("a").forEach(function(a) { a.addEventListener("click", function() { activeTab = a.dataset.tab; renderNav(); renderContent(); }); });
}

function acc(h, inner) {
  var id = "s" + Math.random().toString(36).substr(2, 9);
  return '<div class="story" id="' + id + '"><div class="story-header" onclick="document.getElementById(\'' + id + '\').classList.toggle(\'open\')"><span class="arrow">\u25b6</span><span>' + h + '</span></div><div class="story-body">' + inner + '</div></div>';
}

function renderWorldStory(s) {
  if (!s.perspectives) return "";
  var fnotes = s.footnotes || [];
  return s.perspectives.map(function(p, idx) {
    var c = p.label === "Conservative" ? "label-conservative" : p.label === "Democrat" ? "label-democrat" : "label-thirdparty";
    var sup = fnotes[idx] ? '<sup style="color:#2980b9;cursor:help;" title="' + fnotes[idx].replace(/"/g,'&quot;').replace(/'/g,'&#39;') + '">[' + (idx+1) + ']</sup>' : '';
    var embedId = 'emb' + Math.random().toString(36).substr(2,6);
    var hasEmbed = p.url && p.url.indexOf('/status/') > -1;
    var linkAction = hasEmbed ? 'href="#" onclick="event.preventDefault();toggleEmbed(\'' + embedId + '\',\'' + p.url.replace(/'/g,"\\'") + '\')"' : 'href="' + (p.url || '#') + '" target="_blank"';
    var eng = p.engagement ? '<span style="font-size:0.75rem;color:#888;margin-left:6px;">' + p.engagement + '</span>' : '';
    return '<div class="perspective"><span class="' + c + '">' + p.label + '</span> <span class="handle">' + p.handle + '</span>' + eng + ' &mdash; ' + p.text + ' <span class="honesty">honesty ' + p.honesty + sup + '</span><br><a ' + linkAction + ' class="view-post">View post</a><div id="' + embedId + '" class="tweet-embed-container" style="display:none;margin-top:10px;"></div></div>';
  }).join("") + renderFootnotes(s.footnotes);
}

function renderFootnotes(footnotes) {
  if (!footnotes || !footnotes.length) return '';
  var inner = footnotes.map(function(f, i) { return '<div class="footnote-item"><span style="color:#2980b9;font-weight:600;">[' + (i+1) + ']</span> ' + f + '</div>'; }).join("");
  var id = "fn" + Math.random().toString(36).substr(2, 9);
  return '<div class="footnote-card" id="' + id + '"><div class="story-header" onclick="document.getElementById(\'' + id + '\').classList.toggle(\'open\')"><span class="arrow">\u25b6</span><span>Honesty footnotes (' + footnotes.length + ')</span></div><div class="story-body"><div class="footnotes">' + inner + '</div></div></div>';
}

function renderSinglePost(s) {
  var stats = s.stats ? '<div class="post-stats">' + s.stats + '</div>' : '';
  var honesty = s.honesty ? ' <span class="honesty">honesty ' + s.honesty + '</span>' : '';
  var embedId = 'emb' + Math.random().toString(36).substr(2,6);
  var hasEmbed = s.url && s.url.indexOf('/status/') > -1;
  var linkAction = hasEmbed ? 'href="#" onclick="event.preventDefault();toggleEmbed(\'' + embedId + '\',\'' + s.url.replace(/'/g,"\\'") + '\')"' : 'href="' + s.url + '" target="_blank"';
  var eng = s.engagement ? '<div style="font-size:0.75rem;color:#888;margin-top:2px;">' + s.engagement + '</div>' : '';
  var noteHtml = s.notes ? '<div style="font-size:0.72rem;color:#b5a998;margin-top:6px;font-style:italic;">Score note: ' + s.notes + '</div>' : '';
  return '<div class="single-post"><div class="post-handle"><a href="' + s.url + '" target="_blank">' + s.handle + '</a>' + honesty + '</div>' + eng + '<a ' + linkAction + ' class="view-post">View post</a>' + stats + '<div class="post-body">' + s.body + '</div>' + noteHtml + '<div id="' + embedId + '" class="tweet-embed-container" style="display:none;margin-top:10px;"></div></div>';
}

function renderContent() {
  var el = document.getElementById("content"), today = todayLabel();

function getQuotes() {
  var q = NEWS_DATA.quotes;
  if (!q || !q.data) return {};
  return q.data;
}

function fmtPct(v) {
  if (v === null || v === undefined || isNaN(v)) return "\u2014";
  var s = (v >= 0 ? "+" : "") + v.toFixed(1) + "%";
  return s;
}

function fmtPrice(v, ticker) {
  if (v === null || v === undefined) return "\u2014";
  if (ticker === "BTC-USD") return "$" + Math.round(v).toLocaleString();
  if (v >= 1000) return v.toLocaleString(undefined, {maximumFractionDigits: 0});
  return "$" + v.toFixed(2);
}

function renderHoldings() {
  var quotes = getQuotes();
  var hasData = Object.keys(quotes).length > 0;
  var fetchTime = NEWS_DATA.quotes && NEWS_DATA.quotes.fetchedAt ? NEWS_DATA.quotes.fetchedAt : '';
  var stateLabel = '';
  if (hasData) {
    var anyState = quotes[Object.keys(quotes)[0]];
    var mktState = anyState && anyState.state || '';
    if (mktState === 'REGULAR') stateLabel = '<span style="color:#27ae60;font-size:0.7rem;">Market Open</span>';
    else if (mktState === 'PRE') stateLabel = '<span style="color:#e67e22;font-size:0.7rem;">Pre-Market</span>';
    else if (mktState === 'POST') stateLabel = '<span style="color:#e67e22;font-size:0.7rem;">After Hours</span>';
    else stateLabel = '<span style="color:#999;font-size:0.7rem;">Market Closed</span>';
    if (fetchTime) stateLabel += ' <span style="color:#aaa;font-size:0.65rem;">\u2022 as of ' + fetchTime + '</span>';
  }
  var h = '<div class="holdings-section"><div class="holdings-title">Billionaire Holdings &amp; Market Tracker</div><div class="holdings-subtitle">Key holdings of $age billionaires. ' + stateLabel + '</div>';
  HOLDINGS_STRUCTURE.forEach(function(sec) {
    h += '<div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#888;padding:12px 10px 4px;border-top:1px solid #eee;margin-top:4px;">' + sec.label + '</div>';
    h += '<table class="holdings-table"><thead><tr><th>Ticker</th><th>Name</th><th>Price</th><th>1D</th><th>Held By</th></tr></thead><tbody>';
    sec.rows.forEach(function(s) {
      if (s.pvt) {
        h += '<tr><td class="ticker">' + s.t + '</td><td>' + s.n + '</td><td>' + s.pvt + '</td><td>\u2014</td><td style="font-size:0.7rem;color:#666;">' + s.who + '</td></tr>';
        return;
      }
      var q = quotes[s.t];
      var price = q ? fmtPrice(q.price, s.t) : '\u2014';
      var d1 = q ? fmtPct(q.change) : '\u2014';
      var d1cls = q && q.change < 0 ? "neg" : q && q.change > 0 ? "pos" : "";
      var ticker = s.display || s.t;
      h += '<tr><td class="ticker">' + ticker + '</td><td>' + s.n + '</td><td>' + price + '</td><td class="' + d1cls + '">' + d1 + '</td><td style="font-size:0.7rem;color:#666;">' + s.who + '</td></tr>';
    });
    h += '</tbody></table>';
  });
  h += '</div>';
  return h;
}

// ---- Submissions ----
var submissions = [];
try { submissions = JSON.parse(localStorage.getItem('grokSubs') || '[]'); } catch(e) {}

function handleSubmit(e) {
  e.preventDefault();
  var url = document.getElementById('submitUrl').value.trim();
  var note = document.getElementById('submitNote').value.trim();
  if (!url && !note) return;
  var found = false;
  submissions.forEach(function(s) { if (url && s.url === url) { s.votes++; if (note) s.notes.push(note); found = true; } });
  if (!found) submissions.push({ url: url, notes: note ? [note] : [], votes: 1, timestamp: new Date().toISOString() });
  try { localStorage.setItem('grokSubs', JSON.stringify(submissions)); } catch(e) {}
  document.getElementById('submitForm').reset();
  var c = document.getElementById('submitConfirm');
  c.style.display = 'block';
  c.textContent = found ? 'Upvoted! Posts with multiple votes get featured by Expresso.' : 'Submitted! If others submit the same post, it gets featured.';
  renderSubmissions();
}

function renderSubmissions() {
  var list = document.getElementById('submissionsList');
  if (!list) return;
  var sorted = submissions.slice().sort(function(a, b) { return b.votes - a.votes; });
  if (!sorted.length) { list.innerHTML = '<p style="color:#999;font-size:0.85rem;">No submissions yet. Be the first!</p>'; return; }
  list.innerHTML = sorted.map(function(s) {
    var handle = '';
    try { handle = '@' + new URL(s.url).pathname.split('/')[1]; } catch(e) {}
    var badge = s.votes > 1 ? '<span class="vote-featured">' + s.votes + ' votes \u2014 FEATURED</span>' : '<span class="vote-pending">1 vote</span>';
    return '<div class="story" style="padding:14px 20px;margin-bottom:8px;"><div style="font-weight:600;font-size:0.9rem;">' + (s.url ? '<a href="' + s.url + '" target="_blank" style="color:#2980b9;text-decoration:none;">' + (handle || s.url) + '</a>' : 'No link') + badge + '</div>' + (s.notes.length ? '<div style="font-size:0.85rem;color:#555;margin-top:6px;">' + s.notes[0] + '</div>' : '') + '<div style="font-size:0.7rem;color:#aaa;margin-top:4px;">' + new Date(s.timestamp).toLocaleString() + '</div></div>';
  }).join('');
}

function renderLastUpdated() {
  if (!NEWS_DATA.lastUpdated) return '';
  var updated = new Date(NEWS_DATA.lastUpdated);
  var hours = [6, 9, 12, 15, 18, 21];
  var now = new Date();
  var nextUpdate = null;
  for (var i = 0; i < hours.length; i++) {
    var candidate = new Date(now);
    candidate.setHours(hours[i], 0, 0, 0);
    if (candidate > now) { nextUpdate = candidate; break; }
  }
  if (!nextUpdate) {
    nextUpdate = new Date(now);
    nextUpdate.setDate(nextUpdate.getDate() + 1);
    nextUpdate.setHours(hours[0], 0, 0, 0);
  }
  var nextStr = nextUpdate.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'});
  return '<div class="last-updated">Last updated: ' + updated.toLocaleString() + ' &mdash; Next update: ' + nextStr + '</div>';
}

// ---- Stale check (show banner if data is old, but don't wipe earlier) ----
function checkMidnightRotation() {
  if (!NEWS_DATA.lastUpdated) return;
  var updated = new Date(NEWS_DATA.lastUpdated);
  var now = new Date();
  // If data is more than 18 hours old, mark as stale
  if ((now - updated) > 18 * 60 * 60 * 1000) {
    NEWS_DATA._stale = true;
    renderContent();
  }
}

// ---- Tweet Embed ----
function toggleEmbed(containerId, tweetUrl) {
  var container = document.getElementById(containerId);
  if (!container) return;
  if (container.style.display !== 'none' && container.innerHTML) {
    container.style.display = 'none';
    return;
  }
  container.style.display = 'block';
  container.innerHTML = '<div style="color:#999;font-size:0.8rem;padding:8px;">Loading tweet...</div>';
  var tweetId = tweetUrl.match(/status\/(\d+)/);
  if (tweetId && window.twttr) {
    container.innerHTML = '';
    window.twttr.widgets.createTweet(tweetId[1], container, { theme: 'light', dnt: true, conversation: 'none' });
  } else if (tweetId) {
    container.innerHTML = '';
    var s = document.createElement('script');
    s.src = 'https://platform.twitter.com/widgets.js';
    s.onload = function() {
      if (window.twttr) {
        window.twttr.widgets.createTweet(tweetId[1], container, { theme: 'light', dnt: true, conversation: 'none' });
      }
    };
    document.head.appendChild(s);
  } else {
    container.innerHTML = '<div style="color:#c0392b;font-size:0.8rem;padding:8px;">Could not load embed.</div>';
  }
}

var _myfeedRecognition = null;

function addChip(text) {
  var inp = document.getElementById("myfeedInput");
  if (!inp) return;
  var cur = inp.value.trim();
  inp.value = cur ? cur + ", " + text : text;
}

function clearMyFeed(slot) {
  slot = slot || (activeTab === "myfeed2" ? "2" : "1");
  try { localStorage.removeItem("myfeed_interests_" + slot); localStorage.removeItem("myfeed_stories_" + slot); localStorage.removeItem("myfeed_time_" + slot); } catch(e) {}
  renderNav();
  renderContent();
}

function toggleMic() {
  var btn = document.getElementById("myfeedMic");
  if (_myfeedRecognition) {
    _myfeedRecognition.stop();
    _myfeedRecognition = null;
    if (btn) btn.classList.remove("recording");
    return;
  }
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    var st = document.getElementById("myfeedStatus");
    if (st) st.textContent = "Speech recognition not supported in this browser. Try Chrome.";
    return;
  }
  _myfeedRecognition = new SpeechRecognition();
  _myfeedRecognition.continuous = false;
  _myfeedRecognition.interimResults = false;
  _myfeedRecognition.lang = "en-US";
  if (btn) btn.classList.add("recording");
  _myfeedRecognition.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    var inp = document.getElementById("myfeedInput");
    if (inp) {
      var cur = inp.value.trim();
      inp.value = cur ? cur + ", " + transcript : transcript;
    }
  };
  _myfeedRecognition.onend = function() {
    _myfeedRecognition = null;
    if (btn) btn.classList.remove("recording");
  };
  _myfeedRecognition.onerror = function(e) {
    var st = document.getElementById("myfeedStatus");
    if (st) st.textContent = "Mic error: " + e.error;
    _myfeedRecognition = null;
    if (btn) btn.classList.remove("recording");
  };
  _myfeedRecognition.start();
}

function fetchMyFeed(slot) {
  slot = slot || (activeTab === "myfeed2" ? "2" : "1");
  var inp = document.getElementById("myfeedInput");
  var goBtn = document.getElementById("myfeedGo");
  var status = document.getElementById("myfeedStatus");
  var results = document.getElementById("myfeedResults");
  if (!inp || !inp.value.trim()) { if (status) status.textContent = "Type your interests first!"; return; }
  var interests = inp.value.trim();
  try { localStorage.setItem("myfeed_interests_" + slot, interests); } catch(e) {}
  renderNav();
  if (goBtn) { goBtn.disabled = true; goBtn.textContent = "Searching..."; }
  if (status) status.innerHTML = '\u23f3 Grok is searching X for posts about <strong>' + interests.replace(/</g,"&lt;") + '</strong>... this takes 10-20 seconds.';
  if (results) results.innerHTML = "";
  fetch("/.netlify/functions/custom-stories", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ interests: interests })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) {
      if (status) status.textContent = "Error: " + data.error;
      if (goBtn) { goBtn.disabled = false; goBtn.textContent = "Find Posts"; }
      return;
    }
    try {
      localStorage.setItem("myfeed_stories_" + slot, JSON.stringify(data));
      localStorage.setItem("myfeed_time_" + slot, new Date().toLocaleString());
    } catch(e) {}
    if (status) status.textContent = "";
    if (goBtn) { goBtn.disabled = false; goBtn.textContent = "Find Posts"; }
    renderContent();
  })
  .catch(function(err) {
    if (status) status.textContent = "Network error: " + err.message;
    if (goBtn) { goBtn.disabled = false; goBtn.textContent = "Find Posts"; }
  });
}

  }).catch(function() {});
})();

// ---- Init ----
document.getElementById("currentDate").textContent = formatDate();
renderNav();
loadStories();
setInterval(checkMidnightRotation, 60000);
</script>
