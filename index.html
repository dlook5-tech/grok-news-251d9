<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grok News</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f0e8; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #1a1a1a; color: #f5f0e8; padding: 24px 32px 0; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .logo { font-size: 2rem; font-weight: 700; font-style: italic; }
  .tagline { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: #bbb; margin-bottom: 16px; }
  .date { font-size: 0.85rem; color: #ccc; }
  nav { display: flex; gap: 0; margin: 0 -32px; padding: 0 32px; flex-wrap: wrap; }
  nav a { color: #ccc; text-decoration: none; padding: 10px 14px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s; }
  nav a:hover { color: #fff; }
  nav a.active { color: #fff; border-bottom: 2px solid #fff; }
  main { flex: 1; max-width: 720px; width: 100%; margin: 0 auto; padding: 32px 24px; }
  .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }
  h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; line-height: 1.2; }
  .subtitle { color: #666; font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
  .story { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; background: #fff; overflow: hidden; }
  .story-header { padding: 16px 20px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; font-weight: 600; font-size: 0.95rem; line-height: 1.4; user-select: none; }
  .story-header:hover { background: #fafafa; }
  .arrow { flex-shrink: 0; transition: transform 0.2s; font-size: 0.7rem; margin-top: 4px; }
  .story.open .arrow { transform: rotate(90deg); }
  .story-body { display: none; padding: 0 20px 20px 44px; }
  .story.open .story-body { display: block; }
  .perspective { margin-bottom: 16px; line-height: 1.6; font-size: 0.9rem; }
  .perspective:last-child { margin-bottom: 0; }
  .label-conservative { color: #c0392b; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }
  .label-democrat { color: #2980b9; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }
  .label-thirdparty { color: #555; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }
  .label-elon { color: #e67e22; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }
  .label-sage { color: #8e44ad; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }
  .label-pop { color: #e74c3c; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }
  .handle { font-weight: 600; }
  .perspective-link { text-decoration: none; color: inherit; display: block; border-radius: 6px; transition: background 0.15s; }
  .perspective-link:hover { background: #f0f0f0; }
  .perspective-link:hover .handle { text-decoration: underline; }
  .handle a { color: inherit; text-decoration: none; }
  .handle a:hover { text-decoration: underline; }
  .honesty { font-size: 0.75rem; color: #999; margin-left: 4px; }
  .single-post .post-handle { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
  .single-post .post-handle a { color: #1a1a1a; text-decoration: none; }
  .single-post .post-handle a:hover { text-decoration: underline; }
  .view-post { display: inline-block; color: #2980b9; font-size: 0.8rem; text-decoration: none; margin-bottom: 8px; }
  .view-post:hover { text-decoration: underline; }
  .post-stats { font-size: 0.8rem; color: #888; margin-bottom: 8px; }
  .post-body { font-size: 0.9rem; line-height: 1.6; color: #333; }
  .footnote-item { font-size: 0.85rem; line-height: 1.5; color: #555; margin-bottom: 8px; }
  .history-date { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: #888; letter-spacing: 0.5px; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #ddd; }
  .history-date:first-child { margin-top: 0; }
  footer { text-align: center; padding: 32px; font-size: 0.8rem; color: #999; border-top: 1px solid #ddd; }
  footer strong { color: #666; }
  .last-updated { text-align: center; font-size: 0.7rem; color: #aaa; margin-top: 24px; }
  .submit-form input, .submit-form textarea { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:6px; font-size:0.9rem; margin-bottom:16px; font-family:inherit; }
  .submit-form textarea { resize:vertical; }
  .submit-form label { display:block; font-weight:600; font-size:0.85rem; margin-bottom:6px; }
  .submit-btn { background:#1a1a1a; color:#f5f0e8; border:none; padding:12px 28px; border-radius:6px; font-size:0.9rem; font-weight:600; cursor:pointer; font-family:inherit; }
  .submit-btn:hover { background:#333; }
  .vote-featured { background:#c0392b; color:#fff; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:700; margin-left:8px; }
  .vote-pending { background:#ddd; color:#666; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:600; margin-left:8px; }
  @media (max-width: 600px) { header { padding: 16px 16px 0; } nav { margin: 0 -16px; padding: 0 8px; overflow-x: auto; } nav a { padding: 10px 8px; font-size: 0.7rem; white-space: nowrap; } main { padding: 20px 16px; } .logo { font-size: 1.5rem; } h1 { font-size: 1.4rem; } }
</style>
</head>
<body>
<header><div class="header-top"><div><div class="logo">Grok News</div><div class="tagline">Independent Â· Accurate Â· Essential</div></div><div class="date" id="currentDate"></div></div><nav id="nav"></nav></header>

<footer>&copy; 2026 <strong>Grok News</strong> &mdash; Independent &middot; Accurate &middot; Essential</footer>
<script>
var NEWS_DATA = {

    stories: [{
      headline: "Iran conflict escalates â Isfahan strike, Strait of Hormuz closed, Russia feeding Iran targeting intel",

        { label: "Third Party", handle: "@FurkanGozukara", url: "https://x.com/FurkanGozukara", text: "Bombshell: former U.S. diplomat confirms Russia is actively providing targeting intelligence to Iran to strike American military facilities. Putin is outsmarting Washington.", honesty: "6/10", footnoteId: 3 }
      ],
      footnotes: [
        "1. Presented as speculation based on Iran's own propaganda videos showing open tunnel layouts. Logical but unverified military analysis.",
        "2. Correctly identifies the Strait closure and real economic risks. Direct blame on Trump adds political spin beyond the facts.",
        "3. Claims a former diplomat as the source but does not name them or provide evidence. Plausible in context but unverifiable."
      ]
    }]
  },
  business: {
    title: "Top Business Story of the Day",
    subtitle: "Markets, money, and what's moving business today. Click to expand.",
    stories: [{
      headline: "Markets surge on Iran peace hopes â Dow +1,125, S&P +2.9%, Nasdaq +3.8% best day in months",
      handle: "@VantagePointHQx", url: "https://x.com/VantagePointHQx", stats: "",
      body: "Dow +1,125 pts (+2.5%), S&P 500 +2.9%, Nasdaq +3.8%. After weeks of geopolitical jitters and oil spikes, reports that Iran's president may be open to wrapping up the war sparked a major relief rally to close out Q1 â their best single day in months."
    }]
  },
  sports: {
    title: "Top Sports Story of the Day",
    subtitle: "What's happening in sports right now. Click to expand.",
    stories: [{
      headline: "Italy eliminated from 2026 World Cup by Bosnia â third consecutive World Cup miss",
      handle: "@PopBase", url: "https://x.com/PopBase", stats: "688K+ views Â· 24K+ likes",
      body: "Italy will not be going to the 2026 World Cup after losing to Bosnia â making this the third consecutive World Cup the Azzurri have failed to qualify for, one of the most stunning collapses in international football history."
    }]
  },
  elon: {
    title: "Elon's Best Banger",
    subtitle: "Elon's top post or reply in the last 3 hours. Click to expand.",
    stories: [{
      headline: "Elon reacts to Claude Code source leak â entire codebase now being rewritten in Rust",
      handle: "@elonmusk", url: "https://x.com/elonmusk",
      body: "Elon replied \"Banger\" to a viral thread: an Anthropic insider accidentally leaked the entire Claude Code source via a .map file commit. A dev in Korea cloned the repo, woke up to 25k stars, and his team is now rewriting all of Claude Code in Rust.",
      honesty: "7/10",
      footnotes: [
        "1. Elon's one-word reply amplifies a largely unverified story. The original thread contains real elements (the .map file leak happened) but the claim about a full Rust rewrite and legal immunity is speculative and unconfirmed by Anthropic."
      ]
    }]
  },
  allin: {
    title: "$age",
    subtitle: "Billion-dollar wisdom â the best post from Andreessen, Naval, Chamath, Sacks, Friedberg, Calacanis, Jensen Huang, and friends. Click to expand.",
    stories: [{
      headline: "Chamath Palihapitiya explains why he left the Democrat Party after media lied to him",
      handle: "@WallStreetApes", url: "https://x.com/WallStreetApes",
      body: "Chamath describes his gradual shift starting with Charlottesville coverage â realizing mainstream media portrayal didn't match the raw footage he eventually watched himself. He describes a multi-year process of re-evaluating political assumptions.",
      honesty: "7/10",
      footnotes: [
        "1. Chamath's personal account is genuine and his political evolution is well-documented. However, characterizing all mainstream media as uniformly dishonest oversimplifies a complex media landscape. The Charlottesville example has been debated extensively with valid points on multiple sides."
      ]
    }]
  },
  top: {
    title: "#1 Pop",
    subtitle: "The single most popular post on X by volume of interactions â likes, reposts, replies, and views. Click to expand.",
    stories: [{
      headline: "BTS \"SWIM\" debuts #1 on Billboard Hot 100 â ARMY writes another chapter of history",
      handle: "@bts_bighit", url: "https://x.com/bts_bighit", stats: "12.4M views Â· 2.1M likes Â· 890K reposts",
      body: "BTS celebrates a first-week #1 debut on the Billboard Hot 100 with their new single \"SWIM,\" continuing one of the most dominant runs in modern pop history.",
      honesty: "9/10",
      footnotes: [
        "1. Factually accurate â Billboard confirmed the #1 debut. The only minor quibble: 'most dominant runs in modern pop history' is subjective but defensible given BTS's chart record."
      ]
    }]
  },
  history: [{
    date: "March 29, 2026",
    stories: [
      { headline: "\"No Kings\" protest reactions continue after March 28 nationwide events", perspectives: [
        { label: "Conservative", handle: "@brithume", text: "Protests were a coordinated flop pushed by activist groups with heavy media hype.", honesty: "9/10" },
        { label: "Democrat", handle: "@TheDemocrats", text: "Nationwide rallies showed real opposition to Trump policies.", honesty: "8/10" },
        { label: "Third Party", handle: "@elonmusk", text: "No gods or kings â only man. Performative protests distract from real progress.", honesty: "10/10" }
      ]},
      { headline: "Iran conflict on day 30+ with Iranian retaliation and regional actions", perspectives: [
        { label: "Conservative", handle: "@Telegraph", text: "Trump and Israel taking decisive action to stop Iran's nuclear threat.", honesty: "9/10" },
        { label: "Democrat", handle: "@AJEnglish", text: "Escalation risks wider war with no clear exit strategy.", honesty: "8/10" },
        { label: "Third Party", handle: "@elonmusk", text: "Avoid endless wars; focus on clear threats like nuclear proliferation.", honesty: "9/10" }
      ]},
      { headline: "Partial DHS/TSA shutdown chaos with airport lines and unpaid workers", perspectives: [
        { label: "Conservative", handle: "@Andreafreedom76", text: "Democrats blocking funding and holding TSA workers hostage.", honesty: "9/10" },
        { label: "Democrat", handle: "@ClyneJoseph", text: "Republicans rejecting bills to pay essential TSA workers.", honesty: "8/10" },
        { label: "Third Party", handle: "@elonmusk", text: "Shutdown theater wastes time; both sides need competent governance.", honesty: "10/10" }
      ]},
      { headline: "Senate stalls on SAVE America Act (proof of citizenship + voter ID)", perspectives: [
        { label: "Conservative", handle: "@RepNancyMace", text: "Senate must pass SAVE Act now to secure elections.", honesty: "9/10" },
        { label: "Democrat", handle: "@danielsgoldman", text: "Bill would disenfranchise eligible voters.", honesty: "6/10" },
        { label: "Third Party", handle: "@elonmusk", text: "Failing to pass SAVE is an act of high treason against the American people.", honesty: "8/10" }
      ]},
      { headline: "Landmark rulings against Meta, Google over harm to young people", perspectives: [
        { label: "Conservative", handle: "@MorePerfectUS", text: "Big Tech held accountable for harming kids.", honesty: "9/10" },
        { label: "Democrat", handle: "@CNN", text: "Verdicts prove platforms damaged youth mental health.", honesty: "9/10" },
        { label: "Third Party", handle: "@elonmusk", text: "Free speech does not mean harming children.", honesty: "9/10" }
      ]}
    ]
  }]
};

var TABS = [
  { id: "world", label: "World" },
  { id: "business", label: "Business" },
  { id: "sports", label: "Sports" },
  { id: "elon", label: "Elon" },
  { id: "allin", label: "$age" },
  { id: "top", label: "#1 Pop" },
  { id: "history", label: "History" },
  { id: "submit", label: "Post Your Fav" }
];
var activeTab = "world";

function formatDate() { var d = new Date(), days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"], months = ["January","February","March","April","May","June","July","August","September","October","November","December"]; return days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear(); }
function todayLabel() { var d = new Date(), months = ["January","February","March","April","May","June","July","August","September","October","November","December"]; return months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear(); }

function renderNav() {
  var nav = document.getElementById("nav");
  nav.innerHTML = TABS.map(function(t) { return '<a data-tab="' + t.id + '" class="' + (t.id === activeTab ? 'active' : '') + '">' + t.label + '</a>'; }).join("");
  nav.querySelectorAll("a").forEach(function(a) { a.addEventListener("click", function() { activeTab = a.dataset.tab; renderNav(); renderContent(); }); });
}

function acc(h, inner) {
  var id = "s" + Math.random().toString(36).substr(2, 9);
  return '<div class="story" id="' + id + '"><div class="story-header" onclick="document.getElementById(\'' + id + '\').classList.toggle(\'open\')"><span class="arrow">\u25b6</span><span>' + h + '</span></div><div class="story-body">' + inner + '</div></div>';
}

function renderWorldStory(s) {
  return s.perspectives.map(function(p) {
    var c = p.label === "Conservative" ? "label-conservative" : p.label === "Democrat" ? "label-democrat" : "label-thirdparty";
    var sup = p.footnoteId ? '<sup>' + p.footnoteId + '</sup>' : '';
    return '<a href="' + (p.url || '#') + '" target="_blank" class="perspective-link"><div class="perspective"><span class="' + c + '">' + p.label + '</span> <span class="handle">' + p.handle + '</span> &mdash; ' + p.text + ' <span class="honesty">honesty ' + p.honesty + sup + '</span></div></a>';
  }).join("");
}

function renderFootnotes(footnotes) {
  if (!footnotes || !footnotes.length) return '';
  var inner = footnotes.map(function(f) { return '<div class="footnote-item">' + f + '</div>'; }).join("");
  return acc("Honesty footnotes", '<div class="footnotes">' + inner + '</div>');
}

function renderSinglePost(s) {
  var stats = s.stats ? '<div class="post-stats">' + s.stats + '</div>' : '';
  var honesty = s.honesty ? ' <span class="honesty">honesty ' + s.honesty + '</span>' : '';
  return '<div class="single-post"><div class="post-handle"><a href="' + s.url + '" target="_blank">' + s.handle + '</a>' + honesty + '</div><a class="view-post" href="' + s.url + '" target="_blank">View post</a>' + stats + '<div class="post-body">' + s.body + '</div></div>';
}

function renderContent() {
  var el = document.getElementById("content"), today = todayLabel();

  if (activeTab === "history") {
    var h = '<div class="section-label">History</div><h1>History</h1><p class="subtitle">All stories posted each day, grouped by date. Click any to expand.</p>';
    NEWS_DATA.history.forEach(function(day) {
      h += '<div class="history-date">' + day.date + '</div>';
      day.stories.forEach(function(s) { h += s.perspectives ? acc(s.headline, renderWorldStory(s)) : acc(s.headline, renderSinglePost(s)); });
    });
    h += renderLastUpdated();
    el.innerHTML = h;
    return;
  }

  if (activeTab === "submit") {
    var h = '<div class="section-label">Submit &mdash; ' + today + '</div>' +
      '<h1>Post Your Favorite Tweet</h1>' +
      '<p class="subtitle">Share a post for Grok to consider. If multiple readers submit the same post, it gets featured in the next 3-hour refresh.</p>' +
      '<div class="story" style="padding:24px 20px;"><form class="submit-form" id="submitForm" onsubmit="handleSubmit(event)">' +
      '<label>X / Twitter Link</label><input type="url" id="submitUrl" placeholder="https://x.com/username/status/..." />' +
      '<label>Why should Grok feature this?</label><textarea id="submitNote" rows="3" placeholder="Tell us why this post matters..."></textarea>' +
      '<label>Or paste a screenshot URL</label><input type="url" id="submitScreenshot" placeholder="https://imgur.com/..." />' +
      '<button type="submit" class="submit-btn">Submit for Grok</button></form>' +
      '<div id="submitConfirm" style="display:none;margin-top:16px;padding:12px 16px;background:#e8f5e9;border-radius:6px;color:#2e7d32;font-size:0.9rem;font-weight:600;"></div></div>' +
      '<div style="margin-top:20px;"><h2 style="font-size:1.1rem;margin-bottom:12px;">Reader Submissions</h2><div id="submissionsList"></div></div>';
    el.innerHTML = h;
    renderSubmissions();
    return;
  }

  if (activeTab === "world") {
    var d = NEWS_DATA.world;
    var h = '<div class="section-label">World &mdash; ' + today + '</div><h1>' + d.title + '</h1><p class="subtitle">' + d.subtitle + '</p>';
    d.stories.forEach(function(s) { h += acc(s.headline, renderWorldStory(s)); h += renderFootnotes(s.footnotes); });
    h += renderLastUpdated();
    el.innerHTML = h;
    return;
  }

  // All other tabs
  var labels = { business: "Business", sports: "Sports", elon: "Elon", allin: "$age", top: "#1 Pop" };
  var d = NEWS_DATA[activeTab];
  var h = '<div class="section-label">' + labels[activeTab] + ' &mdash; ' + today + '</div><h1>' + d.title + '</h1><p class="subtitle">' + d.subtitle + '</p>';
  d.stories.forEach(function(s) {
    h += acc(s.headline, renderSinglePost(s));
    if (s.footnotes) h += renderFootnotes(s.footnotes);
  });
  h += renderLastUpdated();
  el.innerHTML = h;
}

// Submissions
var submissions = [];
try { submissions = JSON.parse(localStorage.getItem('grokSubs') || '[]'); } catch(e) {}

function handleSubmit(e) {
  e.preventDefault();
  var url = document.getElementById('submitUrl').value.trim();
  var note = document.getElementById('submitNote').value.trim();
  if (!url && !note) return;
  var found = false;
  submissions.forEach(function(s) { if (url && s.url === url) { s.votes++; if (note) s.notes.push(note); found = true; } });
  if (!found) submissions.push({ url: url, notes: note ? [note] : [], votes: 1, timestamp: new Date().toISOString() });
  try { localStorage.setItem('grokSubs', JSON.stringify(submissions)); } catch(e) {}
  document.getElementById('submitForm').reset();
  var c = document.getElementById('submitConfirm');
  c.style.display = 'block';
  c.textContent = found? 'Upvoted! Posts with multiple votes get featured by Grok.' : 'Submitted! If others submit the same post, it gets featured.';
  renderSubmissions();
}

function renderSubmissions() {
  var list = document.getElementById('submissionsList');
  if (!list) return;
  var sorted = submissions.slice().sort(function(a, b) { return b.votes - a.votes; });
  if (!sorted.length) { list.innerHTML = '<p style="color:#999;font-size:0.85rem;">No submissions yet. Be the first!</p>'; return; }
  list.innerHTML = sorted.map(function(s) {
    var handle = '';
    try { handle = '@' + new URL(s.url).pathname.split('/')[1]; } catch(e) {}
    var badge = s.votes > 1 ? '<span class="vote-featured">' + s.votes + ' votes \u2014 FEATURED</span>' : '<span class="vote-pending">1 vote</span>';
    return '<div class="story" style="padding:14px 20px;margin-bottom:8px;"><div style="font-weight:600;font-size:0.9rem;">' +
      (s.url ? '<a href="' + s.url + '" target="_blank" style="color:#2980b9;text-decoration:none;">' + (handle || s.url) + '</a>' : 'No link') + badge +
      '</div>' + (s.notes.length ? '<div style="font-size:0.85rem;color:#555;margin-top:6px;">' + s.notes[0] + '</div>' : '') +
      '<div style="font-size:0.7rem;color:#aaa;marrgin-top:4px;">' + new Date(s.timestamp).toLocaleString() + '</div></div>';
  }).join('');
}

function renderLastUpdated() { return '<div class="last-updated">Last updated: ' + new Date(NEWS_DATA.lastUpdated).toLocaleString() + '</div>'; }

document.getElementById("currentDate").textContent = formatDate();
renderNav();
renderContent();
</script>
</body>
</html>
