function renderNav() {
  var nav = document.getElementById("nav");

  nav.querySelectorAll("a").forEach(function(a) { a.addEventListener("click", function() { activeTab = a.dataset.tab; renderNav(); renderContent(); }); });
}

function acc(h, inner) {
  var id = "s" + Math.random().toString(36).substr(2, 9);
  return '<div class="story" id="' + id + '"><div class="story-header" onclick="document.getElementById(\'' + id + '\').classList.toggle(\'open\')"><span class="arrow">\u25b6</span><span>' + h + '</span></div><div class="story-body">' + inner + '</div></div>';
}

function renderWorldStory(s) {
  if (!s.perspectives) return ""; return s.perspectives.map(function(p) {
    var c = p.label === "Conservative" ? "label-conservative" : p.label === "Democrat" ? "label-democrat" : "label-thirdparty";
    var sup = p.footnoteId ? '<sup>' + p.footnoteId + '</sup>' : '';
    return '<div class="perspective"><span class="' + c + '">' + p.label + '</span> <span class="handle">' + p.handle + '</span> &mdash; ' + p.text + ' <span class="honesty">honesty ' + p.honesty + sup + '</span><br><a href="' + (p.url || '#') + '" target="_blank" class="view-post">View post</a></div>';
  }).join("") + renderFootnotes(s.footnotes);
}

function renderFootnotes(footnotes) {
  if (!footnotes || !footnotes.length) return '';
  var inner = footnotes.map(function(f) { return '<div class="footnote-item">' + f + '</div>'; }).join("");
  var id = "fn" + Math.random().toString(36).substr(2, 9);
  return '<div class="footnote-card" id="' + id + '"><div class="story-header" onclick="document.getElementById(\'' + id + '\').classList.toggle(\'open\')"><span class="arrow">\u25b6</span><span>Honesty footnotes</span></div><div class="story-body"><div class="footnotes">' + inner + '</div></div></div>';
}

function renderSinglePost(s) {
  var stats = s.stats ? '<div class="post-stats">' + s.stats + '</div>' : '';
  var honesty = s.honesty ? ' <span class="honesty">honesty ' + s.honesty + '</span>' : '';
  return '<div class="single-post"><div class="post-handle"><a href="' + s.url + '" target="_blank">' + s.handle + '</a>' + honesty + '</div><a class="view-post" href="' + s.url + '" target="_blank">View post</a>' + stats + '<div class="post-body">' + s.body + '</div></div>';

// Submissions
var submissions = [];
try { submissions = JSON.parse(localStorage.getItem('grokSubs') || '[]'); } catch(e) {}

function handleSubmit(e) {
  e.preventDefault();
  var url = document.getElementById('submitUrl').value.trim();
  var note = document.getElementById('submitNote').value.trim();
  if (!url && !note) return;
  var found = false;
  submissions.forEach(function(s) { if (url && s.url === url) { s.votes++; if (note) s.notes.push(note); found = true; } });
  if (!found) submissions.push({ url: url, notes: note ? [note] : [], votes: 1, timestamp: new Date().toISOString() });
  try { localStorage.setItem('grokSubs', JSON.stringify(submissions)); } catch(e) {}
  document.getElementById('submitForm').reset();
  var c = document.getElementById('submitConfirm');
  c.style.display = 'block';
  c.textContent = found ? 'Upvoted! Posts with multiple votes get featured by Expresso.' : 'Submitted! If others submit the same post, it gets featured.';
  renderSubmissions();
}

function renderSubmissions() {
  var list = document.getElementById('submissionsList');
  if (!list) return;
  var sorted = submissions.slice().sort(function(a, b) { return b.votes - a.votes; });
  if (!sorted.length) { list.innerHTML = '<p style="color:#999;font-size:0.85rem;">No submissions yet. Be the first!</p>'; return; }
  list.innerHTML = sorted.map(function(s) {
    var handle = '';
    try { handle = '@' + new URL(s.url).pathname.split('/')[1]; } catch(e) {}
    var badge = s.votes > 1 ? '<span class="vote-featured">' + s.votes + ' votes \u2014 FEATURED</span>' : '<span class="vote-pending">1 vote</span>';
    return '<div class="story" style="padding:14px 20px;margin-bottom:8px;"><div style="font-weight:600;font-size:0.9rem;">' +
      (s.url ? '<a href="' + s.url + '" target="_blank" style="color:#2980b9;text-decoration:none;">' + (handle || s.url) + '</a>' : 'No link') + badge +
      '</div>' + (s.notes.length ? '<div style="font-size:0.85rem;color:#555;margin-top:6px;">' + s.notes[0] + '</div>' : '') +
      '<div style="font-size:0.7rem;color:#aaa;margin-top:4px;">' + new Date(s.timestamp).toLocaleString() + '</div></div>';
  }).join('');
}

function renderLastUpdated() {
  var updated = new Date(NEWS_DATA.lastUpdated);
  var hours = [6, 9, 12, 15, 18, 21];
  var now = new Date();
  var nextUpdate = null;
  for (var i = 0; i < hours.length; i++) {
    var candidate = new Date(now);
    candidate.setHours(hours[i], 0, 0, 0);
    if (candidate > now) { nextUpdate = candidate; break; }
  }
  if (!nextUpdate) {
    nextUpdate = new Date(now);
    nextUpdate.setDate(nextUpdate.getDate() + 1);
    nextUpdate.setHours(hours[0], 0, 0, 0);
  }
  var nextStr = nextUpdate.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'});
  return '<div class="last-updated">Last updated: ' + updated.toLocaleString() + ' &mdash; Next update: ' + nextStr + '</div>';
}

// Midnight rotation: move today's stories to history when the day changes
function checkMidnightRotation() {
  var updated = new Date(NEWS_DATA.lastUpdated);
  var now = new Date();
  if (updated.toDateString() !== now.toDateString() && updated < now) {
    var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    var dateLabel = months[updated.getMonth()] + " " + updated.getDate() + ", " + updated.getFullYear();
    var historyStories = [];
    var tabKeys = ["world","business","sports","elon","allin","top","msm","local","recipe"];
    tabKeys.forEach(function(key) {
      var d = NEWS_DATA[key];
      if (!d || !d.stories) return;
      d.stories.forEach(function(s) {
        if (s.perspectives) {
          historyStories.push({ headline: s.headline, perspectives: s.perspectives });
        } else if (s.handle) {
          historyStories.push({ headline: s.headline, perspectives: [{ label: key, handle: s.handle, text: s.body || "", honesty: s.honesty || "" }] });
        }
      });
      d.stories = [];
      if (d.earlier) {
        d.earlier.forEach(function(s) {
          if (s.perspectives) {
            historyStories.push({ headline: s.headline, perspectives: s.perspectives });
          }
        });
        d.earlier = [];
      }
    });
    if (historyStories.length) {
      NEWS_DATA.history.unshift({ date: dateLabel, stories: historyStories });
    }
    NEWS_DATA.lastUpdated = now.toLocaleString();
    renderNav();
    renderContent();
  }
}

// Check for midnight rotation on load and every minute

  document.querySelectorAll(".story").forEach(function(el) {
    var hdr = el.querySelector(".story-header");

      el.className = "footnote-card";
      var ts = hdr.querySelector("span[style]");
      if (ts) ts.remove();
    }
  });
}
