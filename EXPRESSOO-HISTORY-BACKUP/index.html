// Submissions
var submissions = [];
try { submissions = JSON.parse(localStorage.getItem('grokSubs') || '[]'); } catch(e) {}

function handleSubmit(e) {
  e.preventDefault();
  var url = document.getElementById('submitUrl').value.trim();
  var note = document.getElementById('submitNote').value.trim();
  if (!url && !note) return;
  var found = false;
  submissions.forEach(function(s) { if (url && s.url === url) { s.votes++; if (note) s.notes.push(note); found = true; } });
  if (!found) submissions.push({ url: url, notes: note ? [note] : [], votes: 1, timestamp: new Date().toISOString() });
  try { localStorage.setItem('grokSubs', JSON.stringify(submissions)); } catch(e) {}
  document.getElementById('submitForm').reset();
  var c = document.getElementById('submitConfirm');
  c.style.display = 'block';
  c.textContent = found ? 'Upvoted! Posts with multiple votes get featured by Expresso.' : 'Submitted! If others submit the same post, it gets featured.';
  renderSubmissions();
}

function renderSubmissions() {
  var list = document.getElementById('submissionsList');
  if (!list) return;
  var sorted = submissions.slice().sort(function(a, b) { return b.votes - a.votes; });
  if (!sorted.length) { list.innerHTML = '<p style="color:#999;font-size:0.85rem;">No submissions yet. Be the first!</p>'; return; }
  list.innerHTML = sorted.map(function(s) {
    var handle = '';
    try { handle = '@' + new URL(s.url).pathname.split('/')[1]; } catch(e) {}
    var badge = s.votes > 1 ? '<span class="vote-featured">' + s.votes + ' votes \u2014 FEATURED</span>' : '<span class="vote-pending">1 vote</span>';
    return '<div class="story" style="padding:14px 20px;margin-bottom:8px;"><div style="font-weight:600;font-size:0.9rem;">' +
      (s.url ? '<a href="' + s.url + '" target="_blank" style="color:#2980b9;text-decoration:none;">' + (handle || s.url) + '</a>' : 'No link') + badge +
      '</div>' + (s.notes.length ? '<div style="font-size:0.85rem;color:#555;margin-top:6px;">' + s.notes[0] + '</div>' : '') +
      '<div style="font-size:0.7rem;color:#aaa;margin-top:4px;">' + new Date(s.timestamp).toLocaleString() + '</div></div>';
  }).join('');
}

function renderLastUpdated() {
  var updated = new Date(NEWS_DATA.lastUpdated);
  var hours = [6, 9, 12, 15, 18, 21];
  var now = new Date();
  var nextUpdate = null;
  for (var i = 0; i < hours.length; i++) {
    var candidate = new Date(now);
    candidate.setHours(hours[i], 0, 0, 0);
    if (candidate > now) { nextUpdate = candidate; break; }
  }
  if (!nextUpdate) {
    nextUpdate = new Date(now);
    nextUpdate.setDate(nextUpdate.getDate() + 1);
    nextUpdate.setHours(hours[0], 0, 0, 0);
  }
  var nextStr = nextUpdate.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'});
  return '<div class="last-updated">Last updated: ' + updated.toLocaleString() + ' &mdash; Next update: ' + nextStr + '</div>';
}

  }
  // Trim earlier arrays if they get too long
  var tabKeys = ["world","business","sports","elon","allin","top","pods","local","recipe","msm","pg6"];
  tabKeys.forEach(function(key) {
    var d = NEWS_DATA[key];
    if (d && d.earlier && d.earlier.length > MAX_EARLIER) {
      d.earlier = d.earlier.slice(0, MAX_EARLIER);
    }
  });
}

// Auto-refresh My Feed tabs in background on page load if stale (>1 hour old)
(function() {
  ["1","2"].forEach(function(slot) {
    try {
      var interests = localStorage.getItem("myfeed_interests_" + slot);
      var time = localStorage.getItem("myfeed_time_" + slot);
      if (interests && time) {
        var lastFetch = new Date(time).getTime();
        if (Date.now() - lastFetch > 60 * 60 * 1000) {
          // Silently refresh in background
          fetch("/.netlify/functions/custom-stories", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ interests: interests })
          }).then(function(r) { return r.json(); }).then(function(data) {
            if (!data.error && data.stories) {
              try {
                localStorage.setItem("myfeed_stories_" + slot, JSON.stringify(data));
                localStorage.setItem("myfeed_time_" + slot, new Date().toLocaleString());
              } catch(e) {}
              // If user is currently on this feed tab, refresh the view
              if (activeTab === "myfeed" + slot) renderContent();
            }
          }).catch(function() {});
        }
      }
    } catch(e) {}
  });
})();

// ---- Tweet Embed: shows actual tweet without needing X login ----
function toggleEmbed(containerId, tweetUrl) {
  var container = document.getElementById(containerId);
  if (!container) return;
  if (container.style.display !== 'none' && container.innerHTML) {
    container.style.display = 'none';
    return;
  }
  container.style.display = 'block';
  container.innerHTML = '<div style="color:#999;font-size:0.8rem;padding:8px;">Loading tweet...</div>';
  // Use Twitter oEmbed via our proxy to avoid CORS
  var oembed = 'https://publish.twitter.com/oembed?url=' + encodeURIComponent(tweetUrl) + '&omit_script=true&dnt=true';
  // Twitter oEmbed doesn't support CORS directly, so use the embed widget approach
  var tweetId = tweetUrl.match(/status\/(\d+)/);
  if (tweetId && window.twttr) {
    container.innerHTML = '';
    window.twttr.widgets.createTweet(tweetId[1], container, { theme: 'light', dnt: true, conversation: 'none' });
  } else if (tweetId) {
    // Load Twitter widget JS if not loaded yet
    container.innerHTML = '';
    var s = document.createElement('script');
    s.src = 'https://platform.twitter.com/widgets.js';
    s.onload = function() {
      if (window.twttr) {
        window.twttr.widgets.createTweet(tweetId[1], container, { theme: 'light', dnt: true, conversation: 'none' });
      }
    };
    document.head.appendChild(s);
  } else {
    container.innerHTML = '<div style="color:#c0392b;font-size:0.8rem;padding:8px;">Could not load embed.</div>';
  }
}

// ---- My Feed: localStorage + Speech + Netlify Function ----
var _myfeedRecognition = null;

function addChip(text) {
  var inp = document.getElementById("myfeedInput");
  if (!inp) return;
  var cur = inp.value.trim();
  inp.value = cur ? cur + ", " + text : text;
}

function clearMyFeed(slot) {
  slot = slot || (activeTab === "myfeed2" ? "2" : "1");
  try { localStorage.removeItem("myfeed_interests_" + slot); localStorage.removeItem("myfeed_stories_" + slot); localStorage.removeItem("myfeed_time_" + slot); } catch(e) {}
  renderNav();
  renderContent();
}

function toggleMic() {
  var btn = document.getElementById("myfeedMic");
  if (_myfeedRecognition) {
    _myfeedRecognition.stop();
    _myfeedRecognition = null;
    if (btn) btn.classList.remove("recording");
    return;
  }
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    var st = document.getElementById("myfeedStatus");
    if (st) st.textContent = "Speech recognition not supported in this browser. Try Chrome.";
    return;
  }
  _myfeedRecognition = new SpeechRecognition();
  _myfeedRecognition.continuous = false;
  _myfeedRecognition.interimResults = false;
  _myfeedRecognition.lang = "en-US";
  if (btn) btn.classList.add("recording");
  _myfeedRecognition.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    var inp = document.getElementById("myfeedInput");
    if (inp) {
      var cur = inp.value.trim();
      inp.value = cur ? cur + ", " + transcript : transcript;
    }
  };
  _myfeedRecognition.onend = function() {
    _myfeedRecognition = null;
    if (btn) btn.classList.remove("recording");
  };
  _myfeedRecognition.onerror = function(e) {
    var st = document.getElementById("myfeedStatus");
    if (st) st.textContent = "Mic error: " + e.error;
    _myfeedRecognition = null;
    if (btn) btn.classList.remove("recording");
  };
  _myfeedRecognition.start();
}

function fetchMyFeed(slot) {
  slot = slot || (activeTab === "myfeed2" ? "2" : "1");
  var inp = document.getElementById("myfeedInput");
  var goBtn = document.getElementById("myfeedGo");
  var status = document.getElementById("myfeedStatus");
  var results = document.getElementById("myfeedResults");
  if (!inp || !inp.value.trim()) { if (status) status.textContent = "Type your interests first!"; return; }

  var interests = inp.value.trim();
  try { localStorage.setItem("myfeed_interests_" + slot, interests); } catch(e) {}
  renderNav(); // Update tab name to reflect new interests
  if (goBtn) { goBtn.disabled = true; goBtn.textContent = "Searching..."; }
  if (status) status.innerHTML = '\u23f3 Grok is searching X for posts about <strong>' + interests.replace(/</g,"&lt;") + '</strong>... this takes 10-20 seconds.';
  if (results) results.innerHTML = "";

  fetch("/.netlify/functions/custom-stories", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ interests: interests })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) {
      if (status) status.textContent = "Error: " + data.error;
      if (goBtn) { goBtn.disabled = false; goBtn.textContent = "Find Posts"; }
      return;
    }
    var stories = data.stories || data;
    try {
      localStorage.setItem("myfeed_stories_" + slot, JSON.stringify(data));
      localStorage.setItem("myfeed_time_" + slot, new Date().toLocaleString());
    } catch(e) {}
    if (status) status.textContent = "";
    if (goBtn) { goBtn.disabled = false; goBtn.textContent = "Find Posts"; }
    renderContent();
  })
  .catch(function(err) {
    if (status) status.textContent = "Network error: " + err.message;
    if (goBtn) { goBtn.disabled = false; goBtn.textContent = "Find Posts"; }
  });
}
